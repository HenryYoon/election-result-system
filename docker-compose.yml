services:
  # =========================================
  # 선관위 크롤러 (매 :05분 수집)
  # =========================================
  crawler:
    build:
      context: .
      dockerfile: docker/crawler/Dockerfile
    container_name: election_crawler
    init: true
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./nec_urls.csv:/app/nec_urls.csv:ro
    env_file:
      - .env
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # =========================================
  # 변경 감지기 (15분 간격, 24시간 상시)
  # =========================================
  change_detector:
    build:
      context: .
      dockerfile: docker/crawler/Dockerfile
    container_name: election_change_detector
    command: ["python", "crawler/change_detector.py"]
    init: true
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./nec_urls.csv:/app/nec_urls.csv:ro
    env_file:
      - .env
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # =========================================
  # OCR 파이프라인 (드라이브 감시 + OCR 실행)
  # =========================================
  ocr:
    build:
      context: .
      dockerfile: docker/ocr/Dockerfile
    container_name: election_ocr
    volumes:
      - ./images:/app/images
      - ./ocr_results:/app/ocr_results
      - ./approved:/app/approved
      - ./logs:/app/logs
    env_file:
      - .env
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # =========================================
  # 검수 앱 (OCR 결과 검수 UI, 포트 8501)
  # =========================================
  review:
    build:
      context: .
      dockerfile: docker/review/Dockerfile
    container_name: election_review
    ports:
      - "8501:8501"
    volumes:
      - ./ocr_results:/app/ocr_results
      - ./images:/app/images
      - ./approved:/app/approved
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # =========================================
  # 대시보드 (선관위 vs 수동 비교, 포트 8502)
  # =========================================
  dashboard:
    build:
      context: .
      dockerfile: docker/review/Dockerfile
    container_name: election_dashboard
    command: ["streamlit", "run", "review/dashboard.py", "--server.port=8502", "--server.address=0.0.0.0"]
    ports:
      - "8502:8502"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes: {}
