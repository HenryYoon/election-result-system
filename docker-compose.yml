services:
  # =========================================
  # 선관위 크롤러 (requests 엔진, 크롬 불필요)
  # =========================================
  crawler:
    build:
      context: .
      dockerfile: docker/crawler/Dockerfile
    container_name: election_crawler
    init: true
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./nec_urls.csv:/app/nec_urls.csv:ro
    env_file:
      - .env
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes: {}
